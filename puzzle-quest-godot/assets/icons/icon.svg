<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#0d0d2b"/>
  <!-- 3x3 gem grid -->
  <rect x="4"  y="4"  width="16" height="16" rx="3" fill="#e05555"/>
  <rect x="24" y="4"  width="16" height="16" rx="3" fill="#5588e0"/>
  <rect x="44" y="4"  width="16" height="16" rx="3" fill="#44cc66"/>
  <rect x="4"  y="24" width="16" height="16" rx="3" fill="#cccc22"/>
  <rect x="24" y="24" width="16" height="16" rx="3" fill="#aa44ee"/>
  <rect x="44" y="24" width="16" height="16" rx="3" fill="#dddddd"/>
  <rect x="4"  y="44" width="16" height="16" rx="3" fill="#ffaa00"/>
  <rect x="24" y="44" width="16" height="16" rx="3" fill="#ffffff" opacity="0.5"/>
  <rect x="44" y="44" width="16" height="16" rx="3" fill="#e05555"/>
  <!-- shine dots -->
  <circle cx="10" cy="10" r="2" fill="white" opacity="0.6"/>
  <circle cx="30" cy="10" r="2" fill="white" opacity="0.6"/>
  <circle cx="50" cy="10" r="2" fill="white" opacity="0.6"/>
</svg>
